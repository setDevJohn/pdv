# docker-compose.yml — orquestra web, api e banco para rodar o ambiente completo localmente.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: pdv
      POSTGRES_PASSWORD: pdv
      POSTGRES_DB: pdv
    ports:
      - "5432:5432"
    volumes:
      - pdv_db_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://pdv:pdv@db:5432/pdv
      NODE_ENV: development
      WEB_URL: ${WEB_URL:-http://localhost:5173}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?defina JWT_ACCESS_SECRET no .env}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?defina JWT_REFRESH_SECRET no .env}
      JWT_GERENTE_SECRET: ${JWT_GERENTE_SECRET:?defina JWT_GERENTE_SECRET no .env}
    ports:
      - "3000:3000"
    depends_on:
      - db

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      # VITE_API_URL precisa ser build arg, não env de runtime: o bundle é
      # estático (servido pelo nginx) e o Vite já embutiu o valor no build.
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
        VITE_BASE_DOMAIN: ${VITE_BASE_DOMAIN:-}
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  pdv_db_data:
